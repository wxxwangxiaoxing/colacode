# 公共Redis配置 - 在 Nacos 中创建 data-id: common-redis.yaml
spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 200
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
      timeout: 2000ms

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
