version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: colacode-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: colacode
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./doc/colacode-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - colacode-net

  redis:
    image: redis:7-alpine
    container_name: colacode-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - colacode-net

  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: colacode-nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - colacode-net

  elasticsearch:
    image: elasticsearch:7.14.0
    container_name: colacode-es
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - colacode-net

  minio:
    image: minio/minio:latest
    container_name: colacode-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - colacode-net

  rocketmq:
    image: apache/rocketmq:5.1.0
    container_name: colacode-rocketmq
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT: "-Xms256m -Xmx256m"
    networks:
      - colacode-net

  gateway:
    build: ./colacode-gateway
    container_name: colacode-gateway
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - nacos
    networks:
      - colacode-net

  auth:
    build: ./colacode-auth
    container_name: colacode-auth
    ports:
      - "3011:3011"
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - colacode-net

  subject:
    build: ./colacode-subject
    container_name: colacode-subject
    ports:
      - "3010:3010"
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - rocketmq
      - nacos
    networks:
      - colacode-net

  practice:
    build: ./colacode-practice
    container_name: colacode-practice
    ports:
      - "3013:3013"
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - colacode-net

  circle:
    build: ./colacode-circle
    container_name: colacode-circle
    ports:
      - "3014:3014"
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - colacode-net

  interview:
    build: ./colacode-interview
    container_name: colacode-interview
    ports:
      - "3015:3015"
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - colacode-net

  oss:
    build: ./colacode-oss
    container_name: colacode-oss
    ports:
      - "4000:4000"
    depends_on:
      - minio
      - redis
      - nacos
    networks:
      - colacode-net

  ai:
    build: ./colacode-ai
    container_name: colacode-ai
    ports:
      - "3020:3020"
    depends_on:
      - redis
      - nacos
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    networks:
      - colacode-net

volumes:
  mysql-data:
  redis-data:
  es-data:
  minio-data:

networks:
  colacode-net:
    driver: bridge
