server:
  port: ${BOOT3_SERVER_PORT:3020}

spring:
  application:
    name: colacode-ai-boot3
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
    compatibility-verifier:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

colacode:
  ai:
    default-model: mock
    
    deepseek:
      enabled: false
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
      
    openai:
      enabled: false
      
    chatglm:
      enabled: false
      
    qwen:
      enabled: false