server:
  port: ${BOOT3_SERVER_PORT:3020}

spring:
  application:
    name: colacode-ai-boot3
  cloud:
    config:
      import-check:
        enabled: false
    discovery:
      enabled: false
    compatibility-verifier:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:http://localhost:48760}
      api-key: ${OPENAI_API_KEY:disabled}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5.4}

colacode:
  ai:
    default-model: ${COLACODE_AI_DEFAULT_MODEL:mock}
    deepseek:
      enabled: false
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      model: deepseek-chat
    openai:
      enabled: ${COLACODE_AI_OPENAI_ENABLED:false}
      base-url: ${OPENAI_BASE_URL:http://localhost:48760}
      api-key: ${OPENAI_API_KEY:disabled}
      model: ${OPENAI_MODEL:gpt-5.4}
    chatglm:
      enabled: false
    qwen:
      enabled: false
    ollama:
      enabled: false
      base-url: http://localhost:11434
      model: llama3
